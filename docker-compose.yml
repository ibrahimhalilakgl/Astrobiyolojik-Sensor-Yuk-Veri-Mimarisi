services:
  postgres:
    image: postgres:16-alpine
    container_name: mars_rover_db
    environment:
      POSTGRES_DB: mars_rover_db
      POSTGRES_USER: mars_user
      POSTGRES_PASSWORD: mars_password_2024
    ports:
      - "5432:5432"
    volumes:
      - mars_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mars_user -d mars_rover_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mars_pg_data:
